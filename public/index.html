<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>We Sell Rugs  — and we love rugs</title>
  <meta name="description" content="A fast, private messenger." />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
</head>
<body>
  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-brand"><span class="logo">◈</span> We Sell Rugs</div>
      <p class="auth-tagline">Sign in to start selling rugs and making friends.</p>

      <div class="tabs">
        <button class="tab active" data-tab="login" type="button">Log in</button>
        <button class="tab" data-tab="register" type="button">Create account and start selling rugs</button>
      </div>

      <form id="login-form" class="auth-form">
        <label>Username<input name="username" autocomplete="username" required /></label>
        <label>Password<input name="password" type="password" autocomplete="current-password" required /></label>
        <button type="submit" class="btn-primary">Log in</button>
      </form>

      <form id="register-form" class="auth-form hidden">
        <label>Display name<input name="displayName" autocomplete="your fucking name" required /></label>
        <label>Username<input name="username" autocomplete="username" required placeholder="what you want to be called" /></label>
        <label>Password<input name="password" type="password" autocomplete="new-password" required placeholder="dont tell anyone cunt" /></label>
        <button type="submit" class="btn-primary">Create account and become the kingpin</button>
      </form>

      <p id="auth-error" class="auth-error" role="alert"></p>
    </div>
  </div>

  <!-- CHAT APP -->
  <div id="app" class="app hidden">
    <aside class="sidebar">
      <div class="sidebar-head">
        <div class="me">
          <span class="avatar" id="me-avatar"></span>
          <span class="me-name" id="me-name"></span>
        </div>
        <button id="logout-btn" class="icon-btn" title="Log out" type="button">⏻</button>
      </div>

      <!-- Search -->
      <div class="search-wrap">
        <input id="search-input" class="search-input" type="search" autocomplete="off" placeholder="🔍  Search people by name…" />
        <ul id="search-results" class="search-results hidden"></ul>
      </div>

      <div class="sidebar-scroll">
        <!-- Incoming friend requests -->
        <div id="requests-block" class="hidden">
          <div class="sidebar-section-title">Friend requests</div>
          <ul id="request-list" class="row-list"></ul>
        </div>

        <!-- Chats -->
        <div class="sidebar-section-title with-action">
          <span>Chats</span>
          <button id="new-group-btn" class="mini-btn" type="button">+ New group</button>
        </div>
        <ul id="conversation-list" class="row-list"></ul>

        <!-- Friends -->
        <div class="sidebar-section-title">Friends</div>
        <ul id="friends-list" class="row-list"></ul>
      </div>
    </aside>

    <main class="chat">
      <div id="chat-empty" class="chat-empty">
        <div class="chat-empty-inner">
          <span class="logo big">◈</span>
          <p>Search for people, add friends, and start chatting.</p>
        </div>
      </div>

      <section id="chat-active" class="chat-active hidden">
        <header class="chat-header">
          <span class="avatar" id="peer-avatar"></span>
          <div>
            <div class="peer-name" id="peer-name"></div>
            <div class="peer-status" id="peer-status"></div>
          </div>
        </header>
        <div id="messages" class="messages"></div>
        <form id="composer" class="composer">
          <input id="composer-input" autocomplete="off" placeholder="Type a message…" />
          <button type="submit" class="btn-send" title="Send">➤</button>
        </form>
      </section>
    </main>
  </div>

  <!-- NEW GROUP MODAL -->
  <div id="group-modal" class="modal-overlay hidden">
    <div class="modal">
      <h3>New group chat</h3>
      <label class="modal-label">Group name
        <input id="group-name" class="modal-input" maxlength="60" placeholder="e.g. Rug Squad" />
      </label>
      <div class="modal-label">Add friends</div>
      <ul id="group-friend-picker" class="picker-list"></ul>
      <p id="group-error" class="modal-error"></p>
      <div class="modal-actions">
        <button id="group-cancel" class="btn-ghost-sm" type="button">Cancel</button>
        <button id="group-create" class="btn-primary-sm" type="button">Create group</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
